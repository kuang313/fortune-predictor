<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理运程预测 - AI智能版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        #result.show {
            display: block;
            animation: fadeIn 0.6s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bazi-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .bazi-display span {
            font-size: 32px;
            color: white;
            font-weight: bold;
            letter-spacing: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .fortune-text {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
            font-size: 15px;
        }
        .fortune-text::before {
            content: '📜 ';
        }
        .loading {
            text-align: center;
            color: #667eea;
            display: none;
            padding: 20px;
        }
        .loading .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            font-size: 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            display: none;
            padding: 15px;
            background: #fde8e8;
            border-radius: 8px;
        }
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
            text-decoration: none;
        }
        .admin-link:hover { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 AI 命理运程预测</h1>
        <p class="subtitle">基于智谱 GLM-4-Flash 大模型 · 智能解读您的命盘</p>

        <form id="fortuneForm">
            <div class="form-group">
                <label>📅 出生日期</label>
                <input type="date" id="birthday" required max="2026-06-22">
            </div>
            <div class="form-group">
                <label>🕐 出生时辰</label>
                <select id="hour">
                    {% for shi in shichen %}
                    <option value="{{ loop.index0 }}">{{ shi }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn" id="submitBtn">✨ 开始推算</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner">🔮</div>
            <p style="margin-top:10px;">AI正在为您解读命盘，请稍候...</p>
        </div>
        <div class="error" id="error"></div>

        <div id="result">
            <div class="bazi-display">
                <span id="baziDisplay">甲子 甲子 甲子 甲子</span>
            </div>
            <div class="fortune-text" id="fortuneText"></div>
        </div>

        <a href="/admin" class="admin-link">⚙️ 管理员配置</a>
    </div>

    <script>
        document.getElementById('fortuneForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            resultDiv.classList.remove('show');

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        birthday: document.getElementById('birthday').value,
                        hour: document.getElementById('hour').value
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('baziDisplay').textContent = data.data.bazi;
                    document.getElementById('fortuneText').textContent = data.data.fortune;
                    resultDiv.classList.add('show');
                } else {
                    error.textContent = '⚠️ ' + data.message;
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = '⚠️ 网络异常，请检查连接';
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // 设置默认日期
        document.getElementById('birthday').value = '2000-01-01';
    </script>
</body>
</html>
